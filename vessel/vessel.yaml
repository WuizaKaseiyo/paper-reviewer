# Vessel DNA for Research Eval
# Loaded by OMC's vessel_config.load_vessel_config(emp_dir)
# Falls back to OMC's default_vessel.yaml for any field omitted here.

runner:
  module: ""              # empty → standard EmployeeAgent (LangChain)
  class_name: ""

hooks:
  module: ""
  pre_task: ""
  post_task: ""

context:
  prompt_sections: []     # talent_persona.md auto-injected by onboarding
  inject_progress_log: true
  inject_task_history: true

limits:
  # The agentic review does heavy I/O: page through a 30–50pp PDF, map the
  # workspace, grep every reported number, and web-verify every citation
  # (one or more web_search per reference). This is many small tool calls.
  max_retries: 3
  retry_delays: [10, 30, 60]
  max_subtask_iterations: 3
  max_subtask_depth: 1                   # reviewer should NOT dispatch children
  task_timeout_seconds: 3600             # 60 min (deep read + per-number + per-citation audit)
  max_iterations: 200                    # matches research_eval evaluator _MAX_TURNS

capabilities:
  file_upload: true                      # CEO may upload paper PDFs + workspace zips
  websocket: true
  sandbox: true                          # engine runs run_command / python_eval against the workspace
  image_generation: false
